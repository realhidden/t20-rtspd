[user]

;	ENC_RC_MODE_FIXQP               = 0,	/**< Fixqp 模式 */
;	ENC_RC_MODE_CBR                 = 1,	/**< CBR 模式 */
;	ENC_RC_MODE_VBR                 = 2,	/**< VBR 模式*/
;	ENC_RC_MODE_SMART               = 3,	/**< Smart 模式*/
;	ENC_RC_MODE_INV                 = 4,	/**< INV 模式 */

ENCODING_TYPE = 1
MAXQP = 25
MINQP = 10
BIASLVL = 0
FROMQPSTEP = 3
GOPQPSTEP = 15
BITRATE = 8000
WIDTH = 1920
HEIGHT = 1080
; FPS: RATENUM / RATEDEN
RATENUM = 10
RATEDEN = 1
; encoding profile 0: baseline; 1:MP; 2:HP
PROFILE = 0

[recording]
; Enable MKV recording (1=on, 0=off)
ENABLED = 1
; Output directory for MKV files
OUTPUT_DIR = /system/sdcard/DCIM/Recording
; Chunk duration in seconds
CHUNK_DURATION = 300
; Stop recording when disk usage exceeds this percentage
DISK_USAGE_THRESHOLD = 90

[rtsp]
; Enable RTSP server (1=on, 0=off)
ENABLED = 0
; RTSP server port
PORT = 554